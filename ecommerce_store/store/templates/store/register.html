{% extends 'store/base.html' %}
{% block title %}Register - ShopEasy{% endblock %}
{% block content %}
<form method="post" class="auth-form">
    {% csrf_token %}
    <h2>Create an Account</h2>
    {{ form.as_p }}
    <button type="submit" class="btn" style="width:100%;">Register</button>
    <p style="margin-top:1rem;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</form>
{% endblock %}
